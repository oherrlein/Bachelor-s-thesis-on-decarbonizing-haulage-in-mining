notes: >
  Antamina, Peru. Conservative scenario.
  Maximum gradient (10%) taken directly from NI 43-101.
  Transport distances are assumptions – no direct source data available.
  Mine is probably up-gradient (note in Excel).
  Vertical extent of mineralisation: 2000 m (Source: page 7-8, Section 7.3.1).

  About distances: maximal vertical distance is estimated to lay between 800m and 400m. (maximum pit depth = 2000m, but no truck drives the full distance usually)
  calculation: with 10% elevation (5,71 degrees), we have: distance = (vertical distance)/sin(5,71°) = 800m/sin(5,71) = 8000m (conservative case) and
  400m/sin(5,71) = 4000m (progressive case)
